<!DOCTYPE html>
<html>
<head>
    <title>Happy Holi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 18%;
            font-size: 55px;
            animation: colorChange 3s infinite alternate;
        }

        @keyframes colorChange {
            0% { color: #ff0080; }
            25% { color: #ffcc00; }
            50% { color: #00ffcc; }
            75% { color: #ff6600; }
            100% { color: #00ff00; }
        }

        .color {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-100px); }
            to { transform: translateY(100vh); }
        }

        .footer {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>🌈 Happy Holi 🎨</h1>

    <div class="footer">
        Wishing you a colorful and joyful Holi – iam_akashray_
    </div>

    <script>
        function createColor() {
            const color = document.createElement("div");
            color.classList.add("color");
            color.style.left = Math.random() * window.innerWidth + "px";
            color.style.backgroundColor =
                "hsl(" + Math.random() * 360 + ", 100%, 50%)";
            color.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(color);

            setTimeout(() => {
                color.remove();
            }, 5000);
        }

        setInterval(createColor, 100);
    </script>

</body>
</html>
