<!DOCTYPE html>
<html>
<head>
    <title>Happy Holi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 30vh;
            font-size: 9vw;
            animation: colorChange 3s infinite alternate;
        }

        .subtext {
            font-size: 5vw;
            margin-top: 10px;
            opacity: 0.9;
        }

        @keyframes colorChange {
            0% { color: #ff0080; }
            25% { color: #ffcc00; }
            50% { color: #00ffcc; }
            75% { color: #ff6600; }
            100% { color: #00ff00; }
        }

        .color {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-100px); }
            to { transform: translateY(100vh); }
        }

        .footer {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 6vw; /* Increased size */
        }

        .insta-link {
            text-decoration: none;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .insta-logo {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>

    <h1>🌈 Happy Holi 🎨</h1>
    <div class="subtext">
        May your life be filled with colors, happiness, and endless success!
    </div>
    <div style="margin-top:20px; font-size:22px; font-weight:bold;">
  Wishing you a colorful and joyful Holi – 
  <a href="https://www.instagram.com/iam_akashray_" target="_blank" style="color:#ff4da6; text-decoration:none;">
    
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" 
         style="width:22px; vertical-align:middle; margin-right:5px;">
    
    iam_akashray_
  </a>
</div>

    <script>
        function createColor() {
            const color = document.createElement("div");
            color.classList.add("color");
            color.style.left = Math.random() * window.innerWidth + "px";
            color.style.backgroundColor =
                "hsl(" + Math.random() * 360 + ", 100%, 50%)";
            color.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(color);

            setTimeout(() => {
                color.remove();
            }, 5000);
        }

        setInterval(createColor, 120);
    </script>

</body>
</html>
