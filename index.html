<!DOCTYPE html>
<html>
<head>
    <title>Happy Holi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 30vh;
            font-size: 9vw;
            animation: colorChange 3s infinite alternate;
        }

        .subtext {
            font-size: 5vw;
            margin-top: 10px;
            opacity: 0.9;
        }

        @keyframes colorChange {
            0% { color: #ff0080; }
            25% { color: #ffcc00; }
            50% { color: #00ffcc; }
            75% { color: #ff6600; }
            100% { color: #00ff00; }
        }

        .color {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-100px); }
            to { transform: translateY(100vh); }
        }

        .footer {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 6vw; /* Increased size */
        }

        .insta-link {
            text-decoration: none;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .insta-logo {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>

    <h1>🌈 Happy Holi 🎨</h1>
    <div class="subtext">
        May your life be filled with colors, happiness, and endless success!
    </div>

    <div class="footer">
        <a class="insta-link" href="YOUR_INSTAGRAM_LINK" target="_blank">
            Wishing You a Colorful Holi – iam_akashray_
            
            <!-- Instagram Gradient Logo -->
            <svg class="insta-logo" viewBox="0 0 24 24">
                <defs>
                    <linearGradient id="instaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#feda75"/>
                        <stop offset="25%" stop-color="#fa7e1e"/>
                        <stop offset="50%" stop-color="#d62976"/>
                        <stop offset="75%" stop-color="#962fbf"/>
                        <stop offset="100%" stop-color="#4f5bd5"/>
                    </linearGradient>
                </defs>
                <rect x="2" y="2" width="20" height="20" rx="6" fill="url(#instaGradient)"/>
                <circle cx="12" cy="12" r="5" fill="white"/>
                <circle cx="17" cy="7" r="1.5" fill="white"/>
            </svg>
        </a>
    </div>

    <script>
        function createColor() {
            const color = document.createElement("div");
            color.classList.add("color");
            color.style.left = Math.random() * window.innerWidth + "px";
            color.style.backgroundColor =
                "hsl(" + Math.random() * 360 + ", 100%, 50%)";
            color.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(color);

            setTimeout(() => {
                color.remove();
            }, 5000);
        }

        setInterval(createColor, 120);
    </script>

</body>
</html>
